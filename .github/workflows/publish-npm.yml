name: Publish to npm

on:
  push:
    tags: ["v*.*.*"]

jobs:
  publish-sdk:
    name: "@sifter-ai/sdk"
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
        working-directory: code/sdk-ts

      - run: npm ci && npm run build
        working-directory: code/sdk-ts

      - run: npm publish --access public --provenance
        working-directory: code/sdk-ts

  publish-cli:
    name: "@sifter-ai/cli"
    runs-on: ubuntu-latest
    needs: publish-sdk
    permissions:
      id-token: write   # required for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Set version and replace local SDK dependency with published version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
          jq --arg v "^$VERSION" '.dependencies["@sifter-ai/sdk"] = $v' package.json > tmp.json && mv tmp.json package.json
        working-directory: code/cli

      - run: npm ci && npm run build
        working-directory: code/cli

      - run: npm publish --access public --provenance
        working-directory: code/cli
