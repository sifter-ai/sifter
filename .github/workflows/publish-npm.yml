name: Publish to npm

on:
  push:
    tags: ["v*.*.*"]

jobs:
  publish-sdk:
    name: "@sifter-ai/sdk"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
        working-directory: code/sdk-ts

      - run: npm ci && npm run build
        working-directory: code/sdk-ts

      - name: Publish (skip if already published)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXISTING=$(npm view "@sifter-ai/sdk@$VERSION" version 2>/dev/null || true)
          if [ "$EXISTING" = "$VERSION" ]; then
            echo "Version $VERSION already on registry, skipping"
          else
            npm publish --access public
          fi
        working-directory: code/sdk-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-cli:
    name: "@sifter-ai/cli"
    runs-on: ubuntu-latest
    needs: publish-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Set SDK version and build from source
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
          npm ci && npm run build
        working-directory: code/sdk-ts

      - name: Build CLI against local SDK (avoids registry propagation delay)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version
          # Install local SDK tarball so the CLI TypeScript build uses the current source
          npm pack ../sdk-ts
          TARBALL=$(ls @sifter-ai-sdk-*.tgz)
          jq --arg t "./$TARBALL" '.dependencies["@sifter-ai/sdk"] = $t' package.json > tmp.json && mv tmp.json package.json
          npm install && npm run build
          # Restore published SDK reference before packaging for npm
          jq --arg v "^$VERSION" '.dependencies["@sifter-ai/sdk"] = $v' package.json > tmp.json && mv tmp.json package.json
          rm -f "$TARBALL"
        working-directory: code/cli

      - name: Publish (skip if already published)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXISTING=$(npm view "@sifter-ai/cli@$VERSION" version 2>/dev/null || true)
          if [ "$EXISTING" = "$VERSION" ]; then
            echo "Version $VERSION already on registry, skipping"
          else
            npm publish --access public
          fi
        working-directory: code/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
